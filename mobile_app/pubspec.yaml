name: church_sunday_capture
description: Mobile companion app for Sunday church finance data capture.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/branding/logo.png
    - assets/branding/splash_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#146C5C"
  adaptive_icon_foreground: assets/branding/splash_logo.png

flutter_native_splash:
  color: "#F4FAF7"
  image: assets/branding/splash_logo.png
  android_12:
    color: "#F4FAF7"
    image: assets/branding/splash_logo.png
